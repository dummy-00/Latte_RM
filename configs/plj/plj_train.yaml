# dataset
dataset: "plj"
data_path: "/home/plj/home/DataDisk/plj/lvdm/train"
condition_root: "/home/plj/buildings"
use_condition: True
pretrained_model_path: "/home/plj/Latte/pretrained/sd-vae-ft-ema"

# save and load
results_dir: "./results"
pretrained:

# model config
model: Latte-S/8
num_frames: 20
image_size: 256
num_sampling_steps: 250
frame_interval: 1
fixed_spatial: False
attention_bias: True
learn_sigma: True
extras: 3

# train config
save_ceph: False
learning_rate: 1e-4
ckpt_every: 10000
sample_every: 10000
vis_sampling_steps: 250
preview_use_ema: False
clip_max_norm: 0.1
start_clip_iter: 20000
local_batch_size: 8
max_train_steps: 1000000
global_seed: 3407
num_workers: 8
log_every: 50
lr_warmup_steps: 0
resume_from_checkpoint:
gradient_accumulation_steps: 1
num_classes:

# low VRAM and speed up training
use_compile: False
mixed_precision: False
enable_xformers_memory_efficient_attention: False
gradient_checkpointing: False
